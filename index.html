<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Tasks — Stay on top of everything</title>
  <meta name="description" content="A modern to-do list with dark/light mode, edit, filters, and local storage." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%237c3aed'/%3E%3Cstop offset='100%25' stop-color='%234f46e5'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Cpolyline points='7,17 13,23 25,10' stroke='white' stroke-width='3.2' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-layer"></div>

  <main class="container">

    <!-- Header -->
    <header class="header">
      <div class="header-left">

        <!-- App Icon -->
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Clipboard body -->
            <rect x="7" y="9" width="26" height="28" rx="4" fill="white" fill-opacity="0.18"/>
            <rect x="7" y="9" width="26" height="28" rx="4" stroke="white" stroke-opacity="0.5" stroke-width="1.2"/>
            <!-- Clipboard clip -->
            <rect x="14" y="6" width="12" height="6" rx="3" fill="white" fill-opacity="0.35"/>
            <!-- Check lines -->
            <line x1="13" y1="19" x2="27" y2="19" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.45"/>
            <line x1="13" y1="24" x2="22" y2="24" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.45"/>
            <!-- Big checkmark -->
            <polyline points="13,30 17,34 27,22" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <!-- Title group -->
        <div class="title-group">
          <h1 class="title">My<span class="title-accent"> Tasks</span></h1>
          <p class="subtitle">Stay on top of everything</p>
        </div>

      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <span class="theme-icon" id="themeIcon"></span>
      </button>
    </header>

    <!-- Card -->
    <div class="card">

      <!-- Input -->
      <div class="input-section">
        <div class="input-wrapper">
          <input
            type="text"
            id="taskInput"
            class="task-input"
            placeholder="Add a new task..."
            maxlength="200"
            autocomplete="off"
          />
          <button class="add-btn" id="addBtn" aria-label="Add task">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            <span>Add</span>
          </button>
        </div>
        <p class="input-error" id="inputError">Please enter a task.</p>
      </div>

      <!-- Stats -->
      <div class="stats-bar" id="statsBar">
        <div class="stat">
          <span class="stat-num" id="statTotal">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-num stat-active" id="statActive">0</span>
          <span class="stat-label">Active</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-num stat-done" id="statDone">0</span>
          <span class="stat-label">Done</span>
        </div>
      </div>

      <!-- Filters -->
      <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>

      <!-- Task List -->
      <ul class="task-list" id="taskList" role="list"></ul>

      <!-- Empty State -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <path d="M9 12h6M12 9v6" opacity="0.4"/>
          </svg>
        </div>
        <p class="empty-text" id="emptyText">No tasks yet. Add one above!</p>
      </div>

      <!-- Bulk Actions -->
      <div class="bulk-actions" id="bulkActions">
        <button class="bulk-btn btn-clear-completed" id="clearCompletedBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <polyline points="9 11 12 14 22 4"/>
            <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
          Clear Completed
        </button>
        <button class="bulk-btn btn-clear-all" id="clearAllBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4h6v2"/>
          </svg>
          Clear All
        </button>
      </div>

    </div>
  </main>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <h2 class="modal-title" id="modalTitle">Edit Task</h2>
      <input type="text" class="modal-input" id="modalInput" maxlength="200" autocomplete="off" />
      <p class="modal-error" id="modalError">Task cannot be empty.</p>
      <div class="modal-actions">
        <button class="modal-btn modal-cancel" id="modalCancel">Cancel</button>
        <button class="modal-btn modal-save" id="modalSave">Save</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
